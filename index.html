<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>In Memoriam</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:80px;">

<h1>In Memoriam</h1>

<p>Este site é uma homenagem em memória.</p>

<p>Lista de pessoas:</p>

<div id="lista"></div>

<script>
fetch("listas.txt")
  .then(response => response.text())
  .then(text => {
    const linhas = text.split("\n");
    let html = "<ul>";

    linhas.forEach(linha => {
      if(linha.trim() !== ""){
        const partes = linha.split(";");
        const nome = partes[5];
        const cidade = partes[6];
        html += "<li>" + nome + " - " + cidade + "</li>";
      }
    });

    html += "</ul>";
    document.getElementById("lista").innerHTML = html;
  });
</script>

</body>
</html>
